<script>
// ─── Global State ────────────────────────────────────────────────────────────

let appState = {
  currentTab: 'dashboard',
  data: {
    pedidos: [],
    clientes: [],
    produtos: [],
    estoqueFatores: {},
    estoqueDesativados: {},
    estoqueMix: {},
    estoqueModoCompra: {},
    estoqueRendimentoKilo: {},
    estoqueMixFolhaLeve: null,
  },
  editingPedido: null,
  editingCliente: null,
  agendaDiaFiltro: null,
};

/** Chave estável por variedade: trim + Unicode NFC (evita duplicar mapas no estoque). */
function nomeChaveEstoque(raw) {
  const base = raw != null && String(raw).trim() !== '' ? String(raw).trim() : '(sem nome)';
  try {
    return base.normalize('NFC');
  } catch (e) {
    return base;
  }
}

function safeDecodeNomeProdutoEstoque(encoded) {
  if (encoded == null || String(encoded) === '') return '';
  try {
    return decodeURIComponent(String(encoded));
  } catch (err) {
    return String(encoded);
  }
}

function estoqueNomeDoDataset(el) {
  return nomeChaveEstoque(safeDecodeNomeProdutoEstoque(el && el.dataset ? el.dataset.produto : ''));
}

function escapeHtmlEstoque(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function normalizeEstoqueDesativados(raw) {
  if (raw == null || typeof raw !== 'object' || Array.isArray(raw)) return {};
  const out = {};
  for (const k of Object.keys(raw)) {
    if (!k || !raw[k]) continue;
    out[nomeChaveEstoque(k)] = true;
  }
  return out;
}

function normalizeEstoqueRendimentoKilo(raw) {
  if (raw == null || typeof raw !== 'object' || Array.isArray(raw)) return {};
  const out = {};
  for (const k of Object.keys(raw)) {
    if (!k) continue;
    const kn = nomeChaveEstoque(k);
    const v = raw[k];
    const n = typeof v === 'number' ? v : parseFloat(String(v).replace(',', '.'));
    if (Number.isFinite(n) && n > 0) out[kn] = n;
  }
  return out;
}

/** 'unidade' | 'kilo' por produto (compra por unidade de insumo vs por kg). */
function normalizeEstoqueModoCompra(raw) {
  if (raw == null || typeof raw !== 'object' || Array.isArray(raw)) return {};
  const out = {};
  for (const k of Object.keys(raw)) {
    if (!k) continue;
    const kn = nomeChaveEstoque(k);
    const v = raw[k];
    if (v === 'kilo') out[kn] = 'kilo';
    else if (v === 'unidade') out[kn] = 'unidade';
  }
  return out;
}

function normalizeEstoqueFatores(raw) {
  if (raw == null || typeof raw !== 'object' || Array.isArray(raw)) return {};
  const out = {};
  for (const k of Object.keys(raw)) {
    if (!k) continue;
    out[nomeChaveEstoque(k)] = raw[k];
  }
  return out;
}

/** Mix folha leve: total do dia no produto referência, partes iguais entre variedades listadas. */
const ESTOQUE_MIX_FOLHA_PADRAO = {
  referenciaProduto: 'Alface MIX',
  variedades: ['Alface Crespa Verde', 'Alface Crespa Roxa', 'Alface Americana'],
};

function normalizeEstoqueMixFolhaLeve(raw) {
  const refPad = ESTOQUE_MIX_FOLHA_PADRAO.referenciaProduto;
  const varPad = [...ESTOQUE_MIX_FOLHA_PADRAO.variedades];
  if (!raw || typeof raw !== 'object') {
    return {
      referenciaProduto: nomeChaveEstoque(refPad),
      variedades: varPad.map(nomeChaveEstoque),
    };
  }
  const refIn =
    raw.referenciaProduto != null && String(raw.referenciaProduto).trim() !== ''
      ? String(raw.referenciaProduto).trim()
      : refPad;
  let vars = varPad;
  if (Array.isArray(raw.variedades) && raw.variedades.length > 0) {
    vars = raw.variedades.map((x) => String(x).trim()).filter(Boolean);
  }
  const seen = new Set();
  const variedades = [];
  for (const x of vars) {
    const kn = nomeChaveEstoque(x);
    if (seen.has(kn)) continue;
    seen.add(kn);
    variedades.push(kn);
  }
  if (!variedades.length) {
    for (const x of varPad) {
      const kn = nomeChaveEstoque(x);
      if (!seen.has(kn)) {
        seen.add(kn);
        variedades.push(kn);
      }
    }
  }
  return { referenciaProduto: nomeChaveEstoque(refIn), variedades };
}

/** Garante shape estável de appState.data (inclui fatores de compra por produto). */
function normalizeDataShape(d) {
  const src = d || {};
  return {
    pedidos: Array.isArray(src.pedidos) ? src.pedidos : [],
    clientes: Array.isArray(src.clientes) ? src.clientes : [],
    produtos: Array.isArray(src.produtos) ? src.produtos : [],
    prioridades: src.prioridades != null ? src.prioridades : {},
    estoqueFatores: normalizeEstoqueFatores(src.estoqueFatores),
    estoqueDesativados: normalizeEstoqueDesativados(src.estoqueDesativados),
    estoqueMix: normalizeEstoqueDesativados(src.estoqueMix),
    estoqueModoCompra: normalizeEstoqueModoCompra(src.estoqueModoCompra),
    estoqueRendimentoKilo: normalizeEstoqueRendimentoKilo(src.estoqueRendimentoKilo),
    estoqueMixFolhaLeve: normalizeEstoqueMixFolhaLeve(src.estoqueMixFolhaLeve),
  };
}

const DIAS_SEMANA = ['segunda-feira', 'terça-feira', 'quarta-feira', 'quinta-feira', 'sexta-feira', 'sábado'];
const DIAS_CURTOS = {
  'segunda-feira': 'Seg',
  'terça-feira': 'Ter',
  'quarta-feira': 'Qua',
  'quinta-feira': 'Qui',
  'sexta-feira': 'Sex',
  'sábado': 'Sáb',
};
const CATEGORIAS = ['Buque', 'Desfolhado', 'Pote'];

// ─── Inicialização ───────────────────────────────────────────────────────────

async function init() {
  console.log('[app] Iniciando...');
  await loadData();
  console.log('[app] Dados carregados. appState:', JSON.stringify(appState, null, 2).substring(0, 200));
  setupEventListeners();
  setupStorageListener();
  setupAutoSync();
  connectWebSocket();

  // Sincronizar com GitHub imediatamente
  console.log('[sync] Sincronizando com GitHub na inicialização...');
  await syncWithGitHub();
  console.log('[sync] Sincronização inicial concluída');
  
  renderDashboard();
  updateHeaderForTab(appState.currentTab || 'dashboard');
  updateThemeButton();
}

// ─── WebSocket Sync (tempo real na mesma rede / mesmo servidor) ─────────────
let ws = null;
let wsReconnectTimer = null;

function normalizeServerBundle(raw) {
  if (!raw) return null;
  if (raw.data && typeof raw.data === 'object') {
    return {
      data: {
        pedidos: Array.isArray(raw.data.pedidos) ? raw.data.pedidos : [],
        clientes: Array.isArray(raw.data.clientes) ? raw.data.clientes : [],
        produtos: Array.isArray(raw.data.produtos) ? raw.data.produtos : [],
        prioridades: raw.data.prioridades != null ? raw.data.prioridades : {},
        estoqueFatores: normalizeEstoqueFatores(raw.data.estoqueFatores),
        estoqueDesativados: normalizeEstoqueDesativados(raw.data.estoqueDesativados),
        estoqueMix: normalizeEstoqueDesativados(raw.data.estoqueMix),
        estoqueModoCompra: normalizeEstoqueModoCompra(raw.data.estoqueModoCompra),
        estoqueRendimentoKilo: normalizeEstoqueRendimentoKilo(raw.data.estoqueRendimentoKilo),
        estoqueMixFolhaLeve: normalizeEstoqueMixFolhaLeve(raw.data.estoqueMixFolhaLeve),
      },
      lastUpdate: raw.lastUpdate || new Date().toISOString(),
    };
  }
  if (Array.isArray(raw.pedidos)) {
    return {
      data: {
        pedidos: raw.pedidos,
        clientes: Array.isArray(raw.clientes) ? raw.clientes : [],
        produtos: Array.isArray(raw.produtos) ? raw.produtos : [],
        prioridades: raw.prioridades != null ? raw.prioridades : {},
        estoqueFatores: normalizeEstoqueFatores(raw.estoqueFatores),
        estoqueDesativados: normalizeEstoqueDesativados(raw.estoqueDesativados),
        estoqueMix: normalizeEstoqueDesativados(raw.estoqueMix),
        estoqueModoCompra: normalizeEstoqueModoCompra(raw.estoqueModoCompra),
        estoqueRendimentoKilo: normalizeEstoqueRendimentoKilo(raw.estoqueRendimentoKilo),
        estoqueMixFolhaLeve: normalizeEstoqueMixFolhaLeve(raw.estoqueMixFolhaLeve),
      },
      lastUpdate: raw.lastUpdate || new Date().toISOString(),
    };
  }
  return null;
}

function applyRemoteSyncBundle(bundle) {
  const d = bundle.data;
  appState.data = normalizeDataShape(d);
  appState.lastUpdate = bundle.lastUpdate;
  lastSyncTime = new Date(bundle.lastUpdate).getTime();
  localStorage.setItem(DATA_STORAGE_KEY, JSON.stringify(appState.data));
  localStorage.setItem(CLIENT_DATA_TS_KEY, String(lastSyncTime));
  if (appState.data.prioridades && Object.keys(appState.data.prioridades).length) {
    localStorage.setItem('fazendas-up-prioridades', JSON.stringify(appState.data.prioridades));
  }
  renderCurrentTab();
}

function connectWebSocket() {
  if (location.protocol === 'file:') return;
  if (wsReconnectTimer) {
    clearTimeout(wsReconnectTimer);
    wsReconnectTimer = null;
  }
  const scheme = location.protocol === 'https:' ? 'wss' : 'ws';
  const likelyExternalDevServer = location.port && location.port !== '3001';
  const syncHost = likelyExternalDevServer ? 'localhost:3001' : location.host;
  const url = `${scheme}://${syncHost}`;
  try {
    ws = new WebSocket(url);
  } catch (e) {
    console.warn('[sync] WebSocket:', e.message);
    scheduleWsReconnect();
    return;
  }
  ws.addEventListener('open', () => console.log('[sync] WebSocket conectado', url));
  ws.addEventListener('message', (ev) => {
    try {
      const msg = JSON.parse(ev.data);
      if (msg.type !== 'init' && msg.type !== 'update') return;
      const bundle = normalizeServerBundle(msg.data);
      if (!bundle) return;
      applyRemoteSyncBundle(bundle);
    } catch (e) {
      console.warn('[sync] Mensagem WS inválida', e);
    }
  });
  ws.addEventListener('close', () => {
    console.log('[sync] WebSocket desconectado; tentando reconectar…');
    ws = null;
    scheduleWsReconnect();
  });
  ws.addEventListener('error', () => {
    /* close handler faz reconnect */
  });
}

function scheduleWsReconnect() {
  if (location.protocol === 'file:') return;
  if (wsReconnectTimer) return;
  wsReconnectTimer = setTimeout(() => {
    wsReconnectTimer = null;
    connectWebSocket();
  }, 3000);
}

/** Envia o mesmo formato de dados-sync.json para todos os clientes via servidor. */
function pushDataToServer(bundle) {
  const payload = JSON.stringify({ type: 'update', data: bundle });
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(payload);
    return;
  }
  fetch('/api/data', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(bundle),
  }).catch((e) => console.warn('[sync] POST /api/data indisponível:', e.message));
}

async function loadData() {
  const fresh = await fetchLatestDadosSync();
  if (fresh && fresh.bundle && fresh.bundle.data) {
    const remoteTs = new Date(fresh.bundle.lastUpdate || 0).getTime();
    const clientTs = parseInt(localStorage.getItem(CLIENT_DATA_TS_KEY), 10) || 0;
    const storedRaw = localStorage.getItem(DATA_STORAGE_KEY);

    if (fresh.source !== 'api' && clientTs > remoteTs && storedRaw) {
      try {
        const parsed = JSON.parse(storedRaw);
        if (parsed && Array.isArray(parsed.pedidos) && Array.isArray(parsed.clientes)) {
          appState.data = normalizeDataShape(parsed);
          appState.lastUpdate = new Date(clientTs).toISOString();
          lastSyncTime = clientTs;
          if (fresh.sha) lastSyncSha = fresh.sha;
          localStorage.setItem(DATA_STORAGE_KEY, JSON.stringify(appState.data));
          localStorage.setItem('fazendas-up-version', DATA_VERSION);
          if (appState.data.prioridades && Object.keys(appState.data.prioridades).length) {
            localStorage.setItem('fazendas-up-prioridades', JSON.stringify(appState.data.prioridades));
          } else {
            const prioridades = localStorage.getItem('fazendas-up-prioridades');
            if (prioridades && appState.data) {
              appState.data.prioridades = JSON.parse(prioridades);
            }
          }
          console.log('[data] Mantendo alterações locais (mais recentes que o arquivo remoto).');
          return;
        }
      } catch (e) {
        console.log('[data] Cópia local inválida, usando remoto:', e.message);
      }
    }

    const d = fresh.bundle.data;
    appState.data = normalizeDataShape(d);
    if (fresh.bundle.lastUpdate) appState.lastUpdate = fresh.bundle.lastUpdate;
    if (fresh.sha) lastSyncSha = fresh.sha;
    if (appState.lastUpdate) {
      lastSyncTime = new Date(appState.lastUpdate).getTime();
    }
    localStorage.setItem(DATA_STORAGE_KEY, JSON.stringify(appState.data));
    localStorage.setItem(CLIENT_DATA_TS_KEY, String(remoteTs));
    localStorage.setItem('fazendas-up-version', DATA_VERSION);
    if (appState.data.prioridades && Object.keys(appState.data.prioridades).length) {
      localStorage.setItem('fazendas-up-prioridades', JSON.stringify(appState.data.prioridades));
    } else {
      const prioridades = localStorage.getItem('fazendas-up-prioridades');
      if (prioridades && appState.data) {
        appState.data.prioridades = JSON.parse(prioridades);
      }
    }
    return;
  }

  const stored = localStorage.getItem(DATA_STORAGE_KEY);
  const savedVersion = localStorage.getItem('fazendas-up-version');

  if (savedVersion !== DATA_VERSION) {
    console.log('Versão de dados atualizada, recarregando dados embutidos...');
    await loadSampleData();
    localStorage.setItem('fazendas-up-version', DATA_VERSION);
    if (appState.data && appState.data.prioridades) {
      localStorage.setItem('fazendas-up-prioridades', JSON.stringify(appState.data.prioridades));
    } else {
      const prioridades = localStorage.getItem('fazendas-up-prioridades');
      if (prioridades && appState.data) {
        appState.data.prioridades = JSON.parse(prioridades);
      }
    }
    return;
  }

  if (stored) {
    try {
      const parsed = JSON.parse(stored);
      if (parsed.pedidos && parsed.pedidos.length > 0 && parsed.clientes && parsed.clientes.length > 0) {
        appState.data = normalizeDataShape(parsed);
      } else {
        console.log('Dados incompletos no localStorage, recarregando...');
        await loadSampleData();
        localStorage.setItem('fazendas-up-version', DATA_VERSION);
      }
    } catch (e) {
      console.error('Erro ao carregar dados:', e);
      await loadSampleData();
      localStorage.setItem('fazendas-up-version', DATA_VERSION);
    }
  } else {
    await loadSampleData();
    localStorage.setItem('fazendas-up-version', DATA_VERSION);
  }

  if (appState.data && appState.data.prioridades) {
    localStorage.setItem('fazendas-up-prioridades', JSON.stringify(appState.data.prioridades));
  } else {
    const prioridades = localStorage.getItem('fazendas-up-prioridades');
    if (prioridades && appState.data) {
      appState.data.prioridades = JSON.parse(prioridades);
    }
  }
}

function hashString(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) {
    const char = str.charCodeAt(i);
    hash = ((hash << 5) - hash) + char;
    hash = hash & hash; // Convert to 32bit integer
  }
  return hash.toString();
}

function syncDataFromStorage(dataString) {

    // Mostrar notificação de sincronização

/** Base local: espelha dados-sync.json do repositório (pedidos, clientes, produtos, prioridades da agenda). */
async function loadSampleData() {
  const tryLoad = async (url) => {
    const sep = url.includes('?') ? '&' : '?';
    const res = await fetch(url + sep + 't=' + Date.now(), { cache: 'no-store' });
    if (!res.ok) throw new Error(String(res.status));
    return res.json();
  };
  try {
    const urls = [
      'dados-sync.json',
      `https://raw.githubusercontent.com/${GITHUB_REPO}/${GITHUB_BRANCH}/${GITHUB_FILE}`,
    ];
    for (const url of urls) {
      try {
        const root = await tryLoad(url);
        if (!root || !root.data) continue;
        const d = root.data;
        appState.data = normalizeDataShape(d);
        if (root.lastUpdate) appState.lastUpdate = root.lastUpdate;
        localStorage.setItem(DATA_STORAGE_KEY, JSON.stringify(appState.data));
        if (root.lastUpdate) {
          localStorage.setItem(CLIENT_DATA_TS_KEY, String(new Date(root.lastUpdate).getTime()));
        }
        if (appState.data.prioridades && Object.keys(appState.data.prioridades).length) {
          localStorage.setItem('fazendas-up-prioridades', JSON.stringify(appState.data.prioridades));
        }
        console.log('[data] Base carregada de', url.split('/').pop(), root.lastUpdate || '');
        return;
      } catch (e) {
        console.log('[data] Ignorado:', url, e.message);
      }
    }
  } catch (e) {
    console.error('[data] loadSampleData:', e);
  }
  appState.data = normalizeDataShape({ pedidos: [], clientes: [], produtos: [], prioridades: {} });
  localStorage.setItem(DATA_STORAGE_KEY, JSON.stringify(appState.data));
  console.warn('[data] Base vazia: não foi possível carregar dados-sync.json.');
}

async function saveData() {
  try {
    isSaving = true;  // Bloquear sincronização automática
    const now = new Date().toISOString();
    const dataToSave = JSON.stringify(appState.data);
    localStorage.setItem(DATA_STORAGE_KEY, dataToSave);
    localStorage.setItem(CLIENT_DATA_TS_KEY, String(new Date(now).getTime()));
    const savedData = localStorage.getItem(DATA_STORAGE_KEY);
    if (!savedData) {
      console.error('Falha ao salvar dados no localStorage');
    }

    const bundle = { data: appState.data, lastUpdate: now };
    appState.lastUpdate = now;
    lastSyncTime = new Date(now).getTime();
    pushDataToServer(bundle);

    await saveToGitHub();
  } catch (e) {
    console.error('Erro ao salvar dados:', e);
  } finally {
    isSaving = false;
  }
}

  `;
  
  document.getElementById('prioridadeContent').innerHTML = html;

let prioridadeDragItem = null;

function setupPrioridadeDragAndDrop() {
  const list = document.getElementById('prioridadeList');
  if (!list) return;
  const cards = list.querySelectorAll('[data-client-id]');
  cards.forEach((card) => {
    card.addEventListener('dragstart', () => {
      prioridadeDragItem = card;
      card.style.opacity = '0.55';
      card.style.cursor = 'grabbing';
    });
    card.addEventListener('dragend', () => {
      card.style.opacity = '';
      card.style.cursor = 'grab';
      prioridadeDragItem = null;
    });
    card.addEventListener('dragover', (e) => {
      e.preventDefault();
      if (!prioridadeDragItem || prioridadeDragItem === card) return;
      const rect = card.getBoundingClientRect();
      const before = e.clientY < rect.top + rect.height / 2;
      if (before) list.insertBefore(prioridadeDragItem, card);
      else list.insertBefore(prioridadeDragItem, card.nextSibling);
    });
    card.addEventListener('drop', (e) => {
      e.preventDefault();
    });
  });
}

function moverPrioridadeUp(clientId) {
  const list = document.getElementById('prioridadeList');
  const items = Array.from(list.querySelectorAll('[data-client-id]'));
  const currentIndex = items.findIndex(item => item.getAttribute('data-client-id') === clientId);
  
  if (currentIndex > 0) {
    const currentItem = items[currentIndex];
    const previousItem = items[currentIndex - 1];
    list.insertBefore(currentItem, previousItem);
  }
}

function moverPrioridadeDown(clientId) {
  const list = document.getElementById('prioridadeList');
  const items = Array.from(list.querySelectorAll('[data-client-id]'));
  const currentIndex = items.findIndex(item => item.getAttribute('data-client-id') === clientId);
  
  if (currentIndex < items.length - 1) {
    const currentItem = items[currentIndex];
    const nextItem = items[currentIndex + 1];
    list.insertBefore(nextItem, currentItem);
  }
}

function moverPrioridadeTop(clientId) {
  const list = document.getElementById('prioridadeList');
  const item = list.querySelector(`[data-client-id="${clientId}"]`);
  if (!item || !list.firstElementChild || item === list.firstElementChild) return;
  list.insertBefore(item, list.firstElementChild);
}

function moverPrioridadeBottom(clientId) {
  const list = document.getElementById('prioridadeList');
  const item = list.querySelector(`[data-client-id="${clientId}"]`);
  if (!item || !list.lastElementChild || item === list.lastElementChild) return;
  list.appendChild(item);
}

function moverPrioridadeParaPosicao(clientId) {
  const list = document.getElementById('prioridadeList');
  const items = Array.from(list.querySelectorAll('[data-client-id]'));
  const input = document.getElementById(`pos-${clientId}`);
  if (!input) return;
  const targetRaw = parseInt(input.value, 10);
  if (!Number.isFinite(targetRaw)) return;
  const targetIndex = Math.max(0, Math.min(items.length - 1, targetRaw - 1));
  const item = list.querySelector(`[data-client-id="${clientId}"]`);
  if (!item) return;
  const anchor = list.children[targetIndex];
  if (!anchor) {
    list.appendChild(item);
    return;
  }
  if (anchor === item) return;
  list.insertBefore(item, anchor);
}

async function salvarPrioridades() {
  const diaKey = diaVisualizacao === 'hoje' ? getCurrentDay() : diaVisualizacao.toLowerCase();
  const items = document.querySelectorAll('#prioridadeList [data-client-id]');
  const novaOrdem = Array.from(items).map(item => item.getAttribute('data-client-id')).filter(Boolean);
  
  const prioridades = { ...(appState.data.prioridades || {}) };
  prioridades[diaKey] = novaOrdem;
  localStorage.setItem('fazendas-up-prioridades', JSON.stringify(prioridades));
  
  // Sincronizar prioridades no bundle principal e enviar ao GitHub
  appState.data.prioridades = prioridades;
  await saveData();
  
  closeModal('prioridadeModal');
  alert('Prioridades salvas com sucesso!');
  renderDashboard();
}

function renderAgendaList() {

  let diasParaMostrar = appState.agendaDiaFiltro ? [appState.agendaDiaFiltro] : DIAS_SEMANA;

  diasParaMostrar.forEach(dia => {
    let pedidosDia = appState.data.pedidos.filter(p => p.dia_semana === dia);
    
    // Aplicar filtro de clientes

        p.produto.toLowerCase().includes(termo) ||

            return `
            <article class="agenda-hud-client ${toneClass}">
              <div class="agenda-hud-client-top">
                <span class="agenda-hud-client-idx">${idxLabel}</span>
                <div class="agenda-hud-client-id">
                  <span class="agenda-hud-client-name">${grupo.cliente}</span>

                  return `
                  <div class="agenda-hud-line">
                    <span class="agenda-hud-line-dot" aria-hidden="true"></span>
                    <div class="agenda-hud-line-main">
                      <div class="agenda-hud-prod-row">
                        <span class="agenda-hud-prod">${p.produto}</span>
                        ${p.categoria ? `<span class="agenda-hud-tag">${p.categoria}</span>` : ''}

// ─── Modal Functions ────────────────────────────────────────────────────────

function openModal(modalId) {
  document.getElementById(modalId).classList.add('active');
  
  if (modalId === 'clienteModal') {
    updateClientSelects();
    if (!appState.editingCliente) {
      document.getElementById('clienteForm').reset();
      document.getElementById('precosContainer').innerHTML = '';
      const modalTitle = document.querySelector('#clienteModal .modal-content h2');
      if (modalTitle) modalTitle.textContent = 'Novo Cliente';
    } else {
      const modalTitle = document.querySelector('#clienteModal .modal-content h2');
      if (modalTitle) modalTitle.textContent = 'Editar Cliente';
    }
  } else if (modalId === 'pedidoModal') {
    clearPedidoValidationError();
    updateClientSelects();
    // Só resetar se NÃO for edição (editPedido define editingPedido antes de chamar openModal)
    if (!appState.editingPedido) {
      document.getElementById('pedidoForm').reset();
      produtoLineCounter = 0;
      document.getElementById('produtosContainer').innerHTML = '';
      addProdutoLine();
      const modalTitle = document.querySelector('#pedidoModal .modal-content h2');
      if (modalTitle) modalTitle.textContent = 'Novo Pedido';
    }
  }
}

function closeModal(modalId) {
  document.getElementById(modalId).classList.remove('active');
  if (modalId === 'pedidoModal') {
    clearPedidoValidationError();
  }
  appState.editingPedido = null;
  appState.editingCliente = null;
}

function clearPedidoValidationError() {
  const errorEl = document.getElementById('pedidoFormError');
  if (errorEl) {
    errorEl.textContent = '';
    errorEl.style.display = 'none';
  }
  ['pedidoCliente', 'pedidoTipoVenda'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.remove('input-error');
  });
}

function setPedidoValidationError(message, fieldIds = []) {
  const errorEl = document.getElementById('pedidoFormError');
  if (errorEl) {
    errorEl.textContent = message;
    errorEl.style.display = 'block';
  }
  fieldIds.forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.add('input-error');
  });
}

function sendNotification(title, options = {}) {

// ─── Save Functions ────────────────────────────────────────────────────

async function savePedido() {
  clearPedidoValidationError();
  const clienteId = document.getElementById('pedidoCliente').value;
  const cliente = appState.data.clientes.find(c => c.id === clienteId);
  
  if (!cliente) {
    setPedidoValidationError('Selecione um cliente para salvar o pedido.', ['pedidoCliente']);
    return;
  }
  
  const produtoLines = getProdutoLines();
  if (produtoLines.length === 0) {
    setPedidoValidationError('Adicione pelo menos um produto com quantidade válida.');
    return;
  }
  
  // Validar quantidades
  for (const pl of produtoLines) {
    if (!pl.quantidade || pl.quantidade <= 0) {
      setPedidoValidationError(`Quantidade de "${pl.produto || 'produto'}" deve ser maior que 0.`);
      return;
    }
  }
  
  const diaSemana = document.getElementById('pedidoDia').value;
  const tipoVenda = document.getElementById('pedidoTipoVenda').value || '';
  const observacoes = document.getElementById('pedidoObservacoes').value || '';

  if (!tipoVenda) {
    setPedidoValidationError('Selecione o tipo de venda antes de salvar.', ['pedidoTipoVenda']);
    return;
  }
  
  if (appState.editingPedido) {
    // Edição: se só tem 1 produto, atualizar o pedido existente
    // Se tem múltiplos, atualizar o primeiro e criar os demais
    const idx = appState.data.pedidos.findIndex(p => p.id === appState.editingPedido);
    if (idx >= 0) {
      // Atualizar o primeiro produto no pedido existente
      appState.data.pedidos[idx] = {
        ...appState.data.pedidos[idx],
        id_cliente: clienteId,
        cliente: cliente.nome,
        dia_semana: diaSemana,
        produto: produtoLines[0].produto,
        categoria: produtoLines[0].categoria,
        quantidade: produtoLines[0].quantidade,
        tipo_venda: tipoVenda,
        observacoes: observacoes,
      };
      // Criar pedidos adicionais para os demais produtos
      for (let i = 1; i < produtoLines.length; i++) {
        appState.data.pedidos.push({
          id: `order_${Date.now()}_${i}`,
          id_cliente: clienteId,
          cliente: cliente.nome,
          dia_semana: diaSemana,
          produto: produtoLines[i].produto,
          categoria: produtoLines[i].categoria,
          quantidade: produtoLines[i].quantidade,
          tipo_venda: tipoVenda,
          observacoes: observacoes,
          status: 'pendente',
        });
      }
    }
    notifyPedidoChange('alterado', cliente.nome, produtoLines.map(p => p.produto).join(', '));
  } else {
    // Novo: criar um pedido para cada produto
    produtoLines.forEach((pl, i) => {
      appState.data.pedidos.push({
        id: `order_${Date.now()}_${i}`,
        id_cliente: clienteId,
        cliente: cliente.nome,
        dia_semana: diaSemana,
        produto: pl.produto,
        categoria: pl.categoria,
        quantidade: pl.quantidade,
        tipo_venda: tipoVenda,
        observacoes: observacoes,
        status: 'pendente',
      });
    });
    notifyPedidoChange('novo', cliente.nome, produtoLines.map(p => p.produto).join(', '));
  }
  
  await saveData();
  // Limpar o formulário
  document.getElementById('pedidoForm').reset();
  clearPedidoValidationError();
  produtoLineCounter = 0;
  document.getElementById('produtosContainer').innerHTML = '';
  addProdutoLine();
  closeModal('pedidoModal');
  renderAgenda();
}

async function saveCliente() {
  const nome = document.getElementById('clienteNome').value.trim();
  if (!nome) {
    alert('Nome do cliente é obrigatório');
    return;
  }
  
  // Coletar preços especiais
  const precos = [];
  document.querySelectorAll('.preco-input-row').forEach(row => {
    const produto = row.querySelector('.preco-produto-select').value;
    const preco = parseFloat(row.querySelector('.preco-valor-input').value.replace(',', '.')) || 0;
    if (produto && preco > 0) {
      precos.push({ produto, preco });
    }
  });
  
  const clienteData = {
    nome,
    observacoes: document.getElementById('clienteObservacoes').value || '',
    prazoBoleto: document.getElementById('clientePrazoBoleto').value || '',
    acumulaPedidos: document.getElementById('clienteAcumula').checked,
    diasAcumulo: document.getElementById('clienteDiasAcumulo').value || '',
    prazoBoletoAcumulo: document.getElementById('clientePrazoBoletoAcumulo').value || '',
    periodoEntrega: document.getElementById('clientePeriodo').value || '',
    horarioMaximo: document.getElementById('clienteHorario').value || '',
    cobraEntrega: document.getElementById('clienteCobraEntrega').checked,
    precos,
  };
  
  if (appState.editingCliente) {
    // Editar cliente existente
    const idx = appState.data.clientes.findIndex(c => c.id === appState.editingCliente);
    if (idx >= 0) {
      appState.data.clientes[idx] = {
        ...appState.data.clientes[idx],
        ...clienteData,
      };
    }
  } else {
    // Novo cliente
    appState.data.clientes.push({
      id: `client_${Date.now()}`,
      ...clienteData,
    });
  }
  
  await saveData();
  sendNotification('Cliente salvo', { body: nome });
  closeModal('clienteModal');
  renderClientes();
}

async function saveProduto() {
   const nome = document.getElementById('produtoNome').value.trim();
   if (!nome) {
     alert('Nome do produto é obrigatório');
     return;
   }
   
   const novosDados = {
     nome,
     precoBase: parseFloat(document.getElementById('produtoPrecoBase').value) || 0,
     categorias: Array.from(document.getElementById('produtoCategorias').selectedOptions).map(o => o.value),
   };
   
   if (appState.editingProduto) {
     // Edição: atualizar produto existente
     const idx = appState.data.produtos.findIndex(p => p.nome === appState.editingProduto);
     if (idx !== -1) {
       // Se o nome mudou, atualizar referências nos pedidos
       if (appState.editingProduto !== nome) {
         appState.data.pedidos.forEach(p => {
           if (p.produto === appState.editingProduto) p.produto = nome;
         });
       }
       appState.data.produtos[idx] = { ...appState.data.produtos[idx], ...novosDados };
     }
     appState.editingProduto = null;
   } else {
     // Criação: adicionar novo produto
     appState.data.produtos.push(novosDados);
   }
   
   await saveData();
   sendNotification('Produto salvo', { body: nome });
   closeModal('produtoModal');
   renderProdutos();
 }

    <div class="fu-prod-line__cell fu-prod-line__cell--act">
      <button type="button" class="prod-line-remove" onclick="removeProdutoLine('produtoLine_${lineId}')" title="Remover linha">${fuIcon('x', 'icon-svg')}</button>
    </div>
  `;
  container.appendChild(div);
}

function removeProdutoLine(lineId) {
  const line = document.getElementById(lineId);
  if (line) {
    const container = document.getElementById('produtosContainer');
    // Não permitir remover se só tem uma linha
    if (container.children.length > 1) {
      line.remove();
    } else {
      alert('O pedido precisa ter pelo menos 1 produto.');
    }
  }
}

function getProdutoLines() {
  const container = document.getElementById('produtosContainer');
  const lines = container.querySelectorAll('[id^="produtoLine_"]');
  const produtos = [];
  lines.forEach(line => {
    const select = line.querySelector('.prod-select');
    const qty = line.querySelector('.prod-qty');
    const cat = line.querySelector('.prod-cat');
    if (select && select.value) {
      produtos.push({
        produto: select.value,
        quantidade: parseInt(qty.value) || 1,
        categoria: cat.value || '',
      });
    }
  });
  return produtos;
}

function calculateStats() {
  let diaFiltro = diaVisualizacao === 'hoje' ? getCurrentDay() : diaVisualizacao.toLowerCase();
  const pedidosHoje = appState.data.pedidos.filter(p => p.dia_semana === diaFiltro);
  
  // Agrupar por cliente para contar status por CLIENTE
  const clienteStatusMap = {};
  pedidosHoje.forEach(p => {
    if (!clienteStatusMap[p.id_cliente]) {
      clienteStatusMap[p.id_cliente] = p.status || 'pendente';
    }
  });
  const clienteStatuses = Object.values(clienteStatusMap);
  
  return {
    totalPedidos: appState.data.pedidos.length,
    totalQuantidade: appState.data.pedidos.reduce((sum, p) => sum + (p.quantidade || 0), 0),
    clientesUnicos: new Set(appState.data.pedidos.map(p => p.id_cliente)).size,
    produtosUnicos: new Set(appState.data.pedidos.map(p => p.produto)).size,
    // Status contados por CLIENTE (não por pedido)
    pendentes: clienteStatuses.filter(s => s === 'pendente').length,
    prontos: clienteStatuses.filter(s => s === 'pronto').length,
    entregues: clienteStatuses.filter(s => s === 'entregue').length,
    cancelados: clienteStatuses.filter(s => s === 'cancelado').length,
    totalClientesHoje: clienteStatuses.length,
  };
}

function calculateVolumeByDay() {
  const volume = {};
  DIAS_SEMANA.forEach(dia => {
    volume[dia] = appState.data.pedidos
      .filter(p => p.dia_semana === dia)
      .reduce((sum, p) => sum + (p.quantidade || 0), 0);
  });
  return volume;
}

function getProdutosAgregadosDiaSelecionado() {
  const diaFiltro = diaVisualizacao === 'hoje' ? getCurrentDay() : diaVisualizacao.toLowerCase();
  const pedidosDia = appState.data.pedidos.filter((p) => p.dia_semana === diaFiltro);
  const prodMap = {};
  pedidosDia.forEach((p) => {
    const nome = nomeChaveEstoque(p.produto);
    if (!prodMap[nome]) prodMap[nome] = { nome, quantidade: 0 };
    prodMap[nome].quantidade += Number(p.quantidade) || 0;
  });
  return Object.values(prodMap).sort((a, b) => b.quantidade - a.quantidade);
}

function getProdutosHoje() {
  return getProdutosAgregadosDiaSelecionado();
}

/** Fator salvo pelo usuário, ou null se ainda não informado (não inventa valor padrão). */
function getFatorEstoqueParaProduto(nomeProduto) {
  const k = nomeChaveEstoque(nomeProduto);
  const m = appState.data.estoqueFatores && appState.data.estoqueFatores[k];
  if (m === undefined || m === null || m === '') return null;
  const n = typeof m === 'number' ? m : parseFloat(String(m).replace(',', '.'));
  if (!Number.isFinite(n) || n <= 0) return null;
  return n;
}

async function aplicarFatorEstoque(nomeProduto, inputEl) {
  const k = nomeChaveEstoque(nomeProduto);
  const raw = String(inputEl.value).trim().replace(',', '.');
  if (!appState.data.estoqueFatores) appState.data.estoqueFatores = {};
  if (raw === '' || raw === '0') {
    delete appState.data.estoqueFatores[k];
    inputEl.value = '';
  } else {
    const v = parseFloat(raw);
    if (!Number.isFinite(v) || v <= 0) {
      delete appState.data.estoqueFatores[k];
      inputEl.value = '';
    } else {
      appState.data.estoqueFatores[k] = v;
      inputEl.value = String(v);
    }
  }
  await saveData();
  renderEstoqueVivo();
}

/** Para linhas que não são do mix folha leve, Mix aplica +34% sobre os pedidos da própria linha. */
const ESTOQUE_MIX_MULT = 1.34;

function getEstoqueMixFolhaLeveCfg() {
  return normalizeEstoqueMixFolhaLeve(appState.data.estoqueMixFolhaLeve);
}

function quantidadeReferenciaMixFolhaNoDia() {
  const { referenciaProduto } = getEstoqueMixFolhaLeveCfg();
  const refKey = nomeChaveEstoque(referenciaProduto);
  const diaFiltro = diaVisualizacao === 'hoje' ? getCurrentDay() : diaVisualizacao.toLowerCase();
  let s = 0;
  for (const p of appState.data.pedidos) {
    if (p.dia_semana !== diaFiltro) continue;
    if (nomeChaveEstoque(p.produto) === refKey) s += Number(p.quantidade) || 0;
  }
  return s;
}

function isVariedadeMixFolhaLeve(nomeProduto) {
  const k = nomeChaveEstoque(nomeProduto);
  return getEstoqueMixFolhaLeveCfg().variedades.includes(k);
}

function parteIgualMixFolhaLeve() {
  const { variedades } = getEstoqueMixFolhaLeveCfg();
  const n = variedades.length;
  if (n <= 0) return 0;
  return quantidadeReferenciaMixFolhaNoDia() / n;
}

function unidadesAjustadasMixEstoque(nomeProduto, unidadesPedido, mixMarcado) {
  const up = Number(unidadesPedido) || 0;
  if (isVariedadeMixFolhaLeve(nomeProduto) && mixMarcado) {
    return up + parteIgualMixFolhaLeve();
  }
  if (!isVariedadeMixFolhaLeve(nomeProduto) && mixMarcado) {
    return up * ESTOQUE_MIX_MULT;
  }
  return up;
}

function estoqueInjetarLinhasMixFolha(lista) {
  if (quantidadeReferenciaMixFolhaNoDia() <= 0) return lista;
  const { variedades } = getEstoqueMixFolhaLeveCfg();
  const keys = new Set(lista.map((p) => nomeChaveEstoque(p.nome)));
  const extra = [];
  for (const v of variedades) {
    const k = nomeChaveEstoque(v);
    if (!keys.has(k)) {
      extra.push({ nome: k, quantidade: 0 });
      keys.add(k);
    }
  }
  if (!extra.length) return lista;
  return lista.concat(extra).sort((a, b) => b.quantidade - a.quantidade);
}

async function salvarConfigMixFolhaLeve() {
  const refEl = document.getElementById('mixFolhaRefProd');
  const taEl = document.getElementById('mixFolhaVars');
  if (!refEl || !taEl) return;
  const ref = refEl.value.trim();
  const lines = taEl.value.split(/\r?\n/).map((l) => l.trim()).filter(Boolean);
  appState.data.estoqueMixFolhaLeve = normalizeEstoqueMixFolhaLeve({
    referenciaProduto: ref || ESTOQUE_MIX_FOLHA_PADRAO.referenciaProduto,
    variedades: lines.length ? lines : [...ESTOQUE_MIX_FOLHA_PADRAO.variedades],
  });
  await saveData();
  renderEstoqueVivo();
}

function isEstoqueMixAtivo(nomeProduto) {
  const k = nomeChaveEstoque(nomeProduto);
  return !!(appState.data.estoqueMix && appState.data.estoqueMix[k]);
}

function getEstoqueModoCompra(nomeProduto) {
  const k = nomeChaveEstoque(nomeProduto);
  const m = appState.data.estoqueModoCompra && appState.data.estoqueModoCompra[k];
  return m === 'kilo' ? 'kilo' : 'unidade';
}

function getRendimentoKiloParaProduto(nomeProduto) {
  const k = nomeChaveEstoque(nomeProduto);
  const m = appState.data.estoqueRendimentoKilo && appState.data.estoqueRendimentoKilo[k];
  const n = typeof m === 'number' ? m : parseFloat(String(m).replace(',', '.'));
  return Number.isFinite(n) && n > 0 ? n : 0;
}

/**
 * Kg a comprar (arredonda para cima no milésimo = grama).
 * Fórmula: unidades necessárias ÷ (quantas unidades 1 kg rende).
 */
function kgComprarPorRendimento(unidadesNecessarias, produtosPorKg) {
  const u = Number(unidadesNecessarias) || 0;
  const r = Number(produtosPorKg) || 0;
  if (r <= 0 || u <= 0) return 0;
  const raw = u / r;
  return Math.ceil(raw * 1000) / 1000;
}

function formatKgPt(kg) {
  if (!Number.isFinite(kg) || kg <= 0) return '0';
  return kg.toLocaleString('pt-BR', { minimumFractionDigits: 0, maximumFractionDigits: 3 });
}

async function setEstoqueMix(nomeProduto, ativo) {
  const k = nomeChaveEstoque(nomeProduto);
  if (!k) return;
  if (!appState.data.estoqueMix) appState.data.estoqueMix = {};
  if (ativo) appState.data.estoqueMix[k] = true;
  else delete appState.data.estoqueMix[k];
  await saveData();
  renderEstoqueVivo();
}

async function setEstoqueModoCompra(nomeProduto, modo) {
  const k = nomeChaveEstoque(nomeProduto);
  if (!k) return;
  const m = modo === 'kilo' ? 'kilo' : 'unidade';
  if (!appState.data.estoqueModoCompra) appState.data.estoqueModoCompra = {};
  appState.data.estoqueModoCompra[k] = m;
  await saveData();
  renderEstoqueVivo();
}

async function aplicarRendimentoKiloEstoque(nomeProduto, inputEl) {
  const k = nomeChaveEstoque(nomeProduto);
  const raw = String(inputEl.value).trim().replace(',', '.');
  if (!appState.data.estoqueRendimentoKilo) appState.data.estoqueRendimentoKilo = {};
  if (raw === '' || raw === '0') {
    delete appState.data.estoqueRendimentoKilo[k];
    inputEl.value = '';
  } else {
    const v = parseFloat(raw);
    if (!Number.isFinite(v) || v <= 0) {
      delete appState.data.estoqueRendimentoKilo[k];
      inputEl.value = '';
    } else {
      appState.data.estoqueRendimentoKilo[k] = v;
      inputEl.value = String(v);
    }
  }
  await saveData();
  renderEstoqueVivo();
}

async function setEstoqueProdutoDesativado(nomeProduto, desativar) {
  const k = nomeChaveEstoque(nomeProduto);
  if (!k) return;
  if (!appState.data.estoqueDesativados) appState.data.estoqueDesativados = {};
  if (desativar) appState.data.estoqueDesativados[k] = true;
  else delete appState.data.estoqueDesativados[k];
  await saveData();
  renderEstoqueVivo();
}

function handleEstoqueDiaChange(e) {
  diaVisualizacao = e.target.value;
  renderEstoqueVivo();
}

function setupEstoqueDiaSelectListener() {
  const el = document.getElementById('estoqueDiaSelect');
  if (!el) return;
  el.removeEventListener('change', handleEstoqueDiaChange);
  el.addEventListener('change', handleEstoqueDiaChange);
}

function renderEstoqueVivo() {
  const content = document.getElementById('content');
  const desativados = appState.data.estoqueDesativados || {};
  const cfgRawMix =
    appState.data.estoqueMixFolhaLeve && typeof appState.data.estoqueMixFolhaLeve === 'object' ? appState.data.estoqueMixFolhaLeve : {};
  const cfgDisplayRefMix =
    cfgRawMix.referenciaProduto != null && String(cfgRawMix.referenciaProduto).trim() !== ''
      ? String(cfgRawMix.referenciaProduto).trim()
      : ESTOQUE_MIX_FOLHA_PADRAO.referenciaProduto;
  const cfgDisplayVarsMix =
    Array.isArray(cfgRawMix.variedades) && cfgRawMix.variedades.length > 0
      ? cfgRawMix.variedades.join('\n')
      : ESTOQUE_MIX_FOLHA_PADRAO.variedades.join('\n');

  let prodsTodos = getProdutosAgregadosDiaSelecionado();
  prodsTodos = estoqueInjetarLinhasMixFolha(prodsTodos);
  const prods = prodsTodos.filter((p) => !desativados[nomeChaveEstoque(p.nome)]);

  const qRefMixFolha = quantidadeReferenciaMixFolhaNoDia();
  const nMixVar = getEstoqueMixFolhaLeveCfg().variedades.length;
  const parteNum = nMixVar > 0 ? qRefMixFolha / nMixVar : 0;
  const parteStr = parteNum.toLocaleString('pt-BR', { maximumFractionDigits: 6 });
  const nomesDesativados = Object.keys(desativados).sort((a, b) => a.localeCompare(b, 'pt-BR'));
  const diasSemana = ['Segunda-feira', 'Terça-feira', 'Quarta-feira', 'Quinta-feira', 'Sexta-feira', 'Sábado', 'Domingo'];
  const opcoesHtml =
    `<option value="hoje" ${diaVisualizacao === 'hoje' ? 'selected' : ''}>Hoje</option>` +
    diasSemana.map((dia) => `<option value="${dia}" ${diaVisualizacao === dia ? 'selected' : ''}>${dia}</option>`).join('');

  let sumNec = 0;
  let sumUn = 0;
  let sumKg = 0;
  let rowsHtml;
  if (!prodsTodos.length) {
    rowsHtml = `<tr><td colspan="8" style="text-align:center;color:var(--text-light);padding:20px;">Nenhum pedido para este dia.</td></tr>`;
  } else if (!prods.length) {
    rowsHtml = `<tr><td colspan="8" style="text-align:center;color:var(--text-light);padding:20px;">Todos os itens deste dia estão <strong>desativados</strong>. Reative na lista abaixo para voltarem a aparecer.</td></tr>`;
  } else {
    rowsHtml = prods
      .map((p) => {
        const modo = getEstoqueModoCompra(p.nome);
        const mix = isEstoqueMixAtivo(p.nome);
        const inMixFolha = isVariedadeMixFolhaLeve(p.nome);
        const unidadesPedido = Number(p.quantidade) || 0;
        const unidadesParaCompra = unidadesAjustadasMixEstoque(p.nome, unidadesPedido, mix);
        const fator = getFatorEstoqueParaProduto(p.nome);
        const rend = getRendimentoKiloParaProduto(p.nome);
        const mixCbTitle = inMixFolha
          ? nMixVar > 0
            ? `Mix folha leve: com Mix marcado, soma ${parteStr} un. (1/${nMixVar} de ${qRefMixFolha} un. do referência no dia) aos ${unidadesPedido} un. desta linha.`
            : 'Mix folha leve: configure as variedades em Configurar referência.'
          : `Fora do grupo folha: com Mix marcado, multiplica ${unidadesPedido} un. por ${ESTOQUE_MIX_MULT} (+34%).`;
        let comprarCell;
        if (modo === 'kilo') {
          if (rend > 0) {
            const kg = kgComprarPorRendimento(unidadesParaCompra, rend);
            sumKg += kg;
            comprarCell = `<span class="fu-estoque-num" title="Base ${unidadesParaCompra.toLocaleString('pt-BR', { maximumFractionDigits: 4 })} un. (ajuste mix) ÷ ${rend} prod/kg">${formatKgPt(kg)} kg</span>`;
          } else {
            comprarCell = '<span class="estoque-cell-na" title="Informe quantos produtos 1 kg rende (ex.: 8)">—</span>';
          }
        } else if (fator == null) {
          comprarCell = '<span class="estoque-cell-na" title="Informe o fator (insumo por unidade vendida)">—</span>';
        } else {
          const un = Math.ceil(unidadesParaCompra * fator);
          sumUn += un;
          comprarCell = `<span class="fu-estoque-num">${un} un.</span>`;
        }
        sumNec += unidadesPedido;
        const enc = encodeURIComponent(p.nome);
        const mixEsc = escapeHtmlEstoque(p.nome);
        const fatorHtml =
          modo === 'kilo'
            ? '<span class="estoque-cell-na">—</span>'
            : `<input type="number" min="0.01" step="0.01" class="estoque-fator-input" data-produto="${enc}" value="${fator != null ? fator : ''}" placeholder="1" autocomplete="off" aria-label="Fator para ${mixEsc}" />`;
        const rendHtml =
          modo === 'unidade'
            ? '<span class="estoque-cell-na">—</span>'
            : `<input type="number" min="0.01" step="0.01" class="estoque-rendimento-input" data-produto="${enc}" value="${rend > 0 ? rend : ''}" placeholder="8" autocomplete="off" aria-label="Rendimento produtos por kg para ${mixEsc}" />`;
        return `
          <tr>
            <td>${mixEsc}</td>
            <td class="fu-estoque-num">${unidadesPedido}</td>
            <td>
              <select class="estoque-modo-select" data-produto="${enc}" autocomplete="off" aria-label="Unidade ou kg: ${mixEsc}">
                <option value="unidade" ${modo === 'unidade' ? 'selected' : ''}>Un.</option>
                <option value="kilo" ${modo === 'kilo' ? 'selected' : ''}>Kg</option>
              </select>
            </td>
            <td class="fu-estoque-num">${fatorHtml}</td>
            <td class="fu-estoque-num">${rendHtml}</td>
            <td class="fu-estoque-mix">
              <input type="checkbox" class="estoque-mix-cb" data-produto="${enc}" ${mix ? 'checked' : ''} aria-label="Mix para ${mixEsc}" title="${escapeHtmlEstoque(mixCbTitle)}" />
            </td>
            <td class="fu-estoque-num">${comprarCell}</td>
            <td class="fu-estoque-acoes">
              <button type="button" class="estoque-btn-desativar" data-produto="${enc}" title="Ocultar desta lista" aria-label="Ocultar ${mixEsc}">−</button>
            </td>
          </tr>`;
      })
      .join('');
  }

  const desativadosListHtml = nomesDesativados.length
    ? nomesDesativados
        .map((nome) => {
          const enc = encodeURIComponent(nome);
          const noDia = prodsTodos.some((p) => nomeChaveEstoque(p.nome) === nomeChaveEstoque(nome));
          return `<li>
            <span>${escapeHtmlEstoque(nome)}</span>
            ${noDia ? '<span class="estoque-tag-dia" title="Ainda aparece nos pedidos deste dia">Neste dia</span>' : ''}
            <button type="button" class="estoque-reativar-btn" data-produto="${enc}">Reativar</button>
          </li>`;
        })
        .join('')
    : `<li style="border:none;padding:6px 0;color:var(--text-light);">Nenhum item desativado no momento.</li>`;

  content.innerHTML = `
    <div class="dashboard page-shell estoque-vivo">
      <div class="estoque-vivo-toolbar">
        <div class="dashboard-toolbar-lead">
          <h2 class="fu-section-title" style="margin:0;font-weight:800;"><span class="fu-sec-ic">${fuIcon('package', 'icon-svg')}</span>Estoque vivo</h2>
        </div>
        <div class="estoque-dia-select-wrap">
          <label for="estoqueDiaSelect">Dia</label>
          <select id="estoqueDiaSelect" class="estoque-dia-select">
            ${opcoesHtml}
          </select>
        </div>
      </div>
      <details class="estoque-panel-opcoes">
        <summary>Mix folha · referência · ajuda</summary>
        <div class="estoque-panel-opcoes-body">
          <p class="estoque-linha-stats">Hoje: <strong>${qRefMixFolha}</strong> un. «${escapeHtmlEstoque(cfgDisplayRefMix)}»${nMixVar > 0 ? ` → <strong>${parteStr}</strong> un./variedade (${nMixVar} partes)` : ''} · outras linhas com mix: ×${ESTOQUE_MIX_MULT}</p>
          <label class="estoque-cfg-label" for="mixFolhaRefProd">Produto referência (nome nos pedidos)</label>
          <input id="mixFolhaRefProd" type="text" class="estoque-cfg-input" value="${escapeHtmlEstoque(cfgDisplayRefMix)}" autocomplete="off" />
          <label class="estoque-cfg-label" for="mixFolhaVars">Variedades do mix (1 por linha)</label>
          <textarea id="mixFolhaVars" class="estoque-cfg-textarea" autocomplete="off"></textarea>
          <button type="button" class="estoque-cfg-save" onclick="salvarConfigMixFolhaLeve()">Salvar</button>
          <p class="estoque-vivo-hint">Nas variedades da lista, com Mix: soma-se à linha a parte <strong>1/N</strong> do total do dia do produto referência. Demais produtos: Mix aplica <strong>+34%</strong> só sobre os pedidos da linha. Em seguida use <strong>Fat.</strong> (Un.) ou <strong>Rend.</strong> (Kg).</p>
        </div>
      </details>
      <div class="fu-estoque-wrap">
        <table class="fu-estoque-table">
          <thead><tr><th>Produto</th><th>Nec.</th><th>U/K</th><th title="Modo unidade">Fat.</th><th title="Produtos por 1 kg">Rend.</th><th class="fu-estoque-mix" title="Ver ajuda">Mix</th><th>Total</th><th class="fu-estoque-acoes" aria-label="Ações"></th></tr></thead>
          <tbody>${rowsHtml}</tbody>
        </table>
      </div>
      ${prods.length ? `<div class="fu-estoque-foot">Nec. <span>${sumNec}</span>${sumUn > 0 ? ` · Un. <span>${sumUn}</span>` : ''}${sumKg > 0 ? ` · Kg <span>${formatKgPt(sumKg)}</span>` : ''}</div>` : ''}
      <details class="estoque-desativados-panel">
        <summary>Ocultos (${nomesDesativados.length})</summary>
        <p class="estoque-desativados-hint">Não entram nos totais. Reative quando precisar.</p>
        <ul class="estoque-desativados-list">${desativadosListHtml}</ul>
      </details>
    </div>
  `;

  setupEstoqueDiaSelectListener();
  const taMix = document.getElementById('mixFolhaVars');
  if (taMix) taMix.value = cfgDisplayVarsMix;
  content.querySelectorAll('.estoque-fator-input').forEach((inp) => {
    inp.addEventListener('change', async () => {
      await aplicarFatorEstoque(estoqueNomeDoDataset(inp), inp);
    });
  });
  content.querySelectorAll('.estoque-mix-cb').forEach((cb) => {
    cb.addEventListener('change', async () => {
      await setEstoqueMix(estoqueNomeDoDataset(cb), cb.checked);
    });
  });
  content.querySelectorAll('.estoque-modo-select').forEach((sel) => {
    sel.addEventListener('change', async () => {
      await setEstoqueModoCompra(estoqueNomeDoDataset(sel), sel.value);
    });
  });
  content.querySelectorAll('.estoque-rendimento-input').forEach((inp) => {
    inp.addEventListener('change', async () => {
      await aplicarRendimentoKiloEstoque(estoqueNomeDoDataset(inp), inp);
    });
  });
  content.querySelectorAll('.estoque-btn-desativar').forEach((btn) => {
    btn.addEventListener('click', async () => {
      await setEstoqueProdutoDesativado(estoqueNomeDoDataset(btn), true);
    });
  });
  content.querySelectorAll('.estoque-reativar-btn').forEach((btn) => {
    btn.addEventListener('click', async () => {
      await setEstoqueProdutoDesativado(estoqueNomeDoDataset(btn), false);
    });
  });
}

function getClientesHoje() {
  let diaFiltro = diaVisualizacao === 'hoje' ? getCurrentDay() : diaVisualizacao.toLowerCase();
  const pedidosHoje = appState.data.pedidos.filter(p => p.dia_semana === diaFiltro);
  
  const grouped = {};
  pedidosHoje.forEach(p => {
    if (!grouped[p.id_cliente]) {
      grouped[p.id_cliente] = { clientId: p.id_cliente, clientName: p.cliente, pedidos: [] };
    }
    grouped[p.id_cliente].pedidos.push(p);
  });
  
  let clientes = Object.values(grouped);
  
  // Aplicar priorização se existir
  const prioridades = appState.data.prioridades || {};
  const diaKey = diaVisualizacao === 'hoje' ? getCurrentDay() : diaVisualizacao.toLowerCase();
  const prioridadesDia = prioridades[diaKey] || [];
  
  if (prioridadesDia.length > 0) {
    clientes.sort((a, b) => {
      const indexA = prioridadesDia.indexOf(a.clientId);
      const indexB = prioridadesDia.indexOf(b.clientId);
      
      // Se ambos estão na lista de prioridades, ordenar por posição
      if (indexA !== -1 && indexB !== -1) return indexA - indexB;
      // Se apenas A está na lista, vem primeiro
      if (indexA !== -1) return -1;
      // Se apenas B está na lista, vem primeiro
      if (indexB !== -1) return 1;
      // Se nenhum está na lista, ordenar alfabeticamente
      return a.clientName.localeCompare(b.clientName);
    });
  } else {
    clientes.sort((a, b) => a.clientName.localeCompare(b.clientName));
  }
  
  return clientes;
}

function getCurrentDay() {
  const days = ['domingo', 'segunda-feira', 'terça-feira', 'quarta-feira', 'quinta-feira', 'sexta-feira', 'sábado'];
  return days[new Date().getDay()];
}

const SPREADSHEET_ID = '1ENavAcPvpKhNnZGgMElOeeVPO1ml8G6HaPghTgTwEFs';

function parseCSV(text) {
  const rows = [];
  let current = '';
  let inQuotes = false;
  let row = [];
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (inQuotes) {
      if (ch === '"' && text[i+1] === '"') { current += '"'; i++; }
      else if (ch === '"') { inQuotes = false; }
      else { current += ch; }
    } else {
      if (ch === '"') { inQuotes = true; }
      else if (ch === ',') { row.push(current.trim()); current = ''; }
      else if (ch === '\n' || (ch === '\r' && text[i+1] === '\n')) {
        row.push(current.trim()); current = '';
        if (row.some(c => c !== '')) rows.push(row);
        row = [];
        if (ch === '\r') i++;
      } else { current += ch; }
    }
  }
  row.push(current.trim());
  if (row.some(c => c !== '')) rows.push(row);
  return rows;
}

async function buscarDadosPlanilha() {
  const btn = document.getElementById('btnAtualizar');
  const textoOriginal = btn.innerHTML;
  btn.innerHTML = 'Buscando…';

  try {

    const resPedidos = await fetch(urlPedidos);
    if (!resPedidos.ok) throw new Error('Erro ao acessar planilha de pedidos');
    const csvPedidos = await resPedidos.text();
    const rowsPedidos = parseCSV(csvPedidos);
    
    // Buscar listas suspensas (clientes, produtos, categorias)
    const urlListas = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&sheet=Lista%20suspensa&range=A1:D100`;
    const resListas = await fetch(urlListas);
    if (!resListas.ok) throw new Error('Erro ao acessar lista suspensa');
    const csvListas = await resListas.text();
    const rowsListas = parseCSV(csvListas);
    
    // Pular cabeçalho dos pedidos
    const header = rowsPedidos[0];
    const pedidosRaw = rowsPedidos.slice(1).filter(r => r.length >= 4 && r[2] && r[3] && !r[0].startsWith('#N/A'));
    
    // Processar pedidos
    const pedidos = pedidosRaw.map((r, idx) => ({
      id: `order_${idx}`,
      id_cliente: r[0] || '',
      dia_semana: r[1] || '',
      cliente: r[2] || '',
      produto: r[3] || '',
      categoria: r[4] || '',
      quantidade: parseInt(r[5]) || 0,
      tipo_venda: r[6] || '',
      observacoes: r[7] || '',
      status: 'pendente',
    }));
    
    // Extrair clientes únicos dos pedidos
    const clientesMap = {};
    pedidos.forEach(p => {
      if (p.cliente && !clientesMap[p.cliente]) {
        clientesMap[p.cliente] = {
          id: p.id_cliente || `cli_${Object.keys(clientesMap).length}`,
          nome: p.cliente,
          observacoes: '',
          prazoBoleto: '',
          acumulaPedidos: false,
          diasAcumulo: '',
          prazoBoletoAcumulo: '',
          periodoEntrega: '',
          horarioMaximo: '',
          cobraEntrega: false,
          precos: [],
        };
      }
    });
    
    // Preservar dados de clientes editados (preços, observações, etc.)
    const clientesAntigos = {};
    appState.data.clientes.forEach(c => { clientesAntigos[c.nome] = c; });
    const clientes = Object.values(clientesMap).map(c => {
      const antigo = clientesAntigos[c.nome];
      if (antigo) {
        return { ...c, observacoes: antigo.observacoes, prazoBoleto: antigo.prazoBoleto, acumulaPedidos: antigo.acumulaPedidos, diasAcumulo: antigo.diasAcumulo, prazoBoletoAcumulo: antigo.prazoBoletoAcumulo, periodoEntrega: antigo.periodoEntrega, horarioMaximo: antigo.horarioMaximo, cobraEntrega: antigo.cobraEntrega, precos: antigo.precos };
      }
      return c;
    });
    
    // Extrair produtos únicos
    const produtosMap = {};
    pedidos.forEach(p => {
      if (p.produto) {
        if (!produtosMap[p.produto]) {
          produtosMap[p.produto] = { nome: p.produto, categorias: [], precoBase: 0 };
        }
        if (p.categoria && !produtosMap[p.produto].categorias.includes(p.categoria)) {
          produtosMap[p.produto].categorias.push(p.categoria);
        }
      }
    });
    
    // Preservar preços base editados
    const produtosAntigos = {};
    appState.data.produtos.forEach(p => { produtosAntigos[p.nome] = p; });
    const produtos = Object.values(produtosMap).map(p => {
      const antigo = produtosAntigos[p.nome];
      if (antigo && antigo.precoBase) { p.precoBase = antigo.precoBase; }
      return p;
    });
    
    // Atualizar estado
    appState.data.pedidos = pedidos;
    appState.data.clientes = clientes;
    appState.data.produtos = produtos;
    await saveData();
    
    switchTab(appState.currentTab);
    alert(`Dados atualizados da planilha!\n${pedidos.length} pedidos, ${clientes.length} clientes e ${produtos.length} produtos carregados.`);
    
  } catch (e) {
    console.error('Erro ao buscar dados da planilha:', e);
    alert('Erro ao buscar dados da planilha: ' + e.message + '\n\nVerifique se a planilha está compartilhada como "Qualquer pessoa com o link pode ver".');
  } finally {
    btn.innerHTML = textoOriginal;
    btn.disabled = false;
  }
}





// ─── Sincronização com GitHub (REESCRITO) ──────────────────────────────────────────────────────────────────────────────
const GITHUB_REPO = 'fazendasup/fazendas-up';
const GITHUB_FILE = 'dados-sync.json';
const GITHUB_BRANCH = 'main';
const SYNC_INTERVAL = 5000; // 5 segundos

function isGitHubPagesHost() {
  return typeof location !== 'undefined' && /\.github\.io$/i.test(location.hostname);
}

/** Servidor local (Node na LAN, etc.) — priorizar dados-sync.json da origem, não a API do repo */
function isLikelyLocalDevServer() {
  if (typeof location === 'undefined') return false;
  const h = location.hostname;
  return (
    h === 'localhost' ||
    h === '127.0.0.1' ||
    /^192\.168\.\d{1,3}\.\d{1,3}$/.test(h) ||
    /^10\.\d{1,3}\.\d{1,3}\.\d{1,3}$/.test(h)
  );
}

/** Pages (github.io ou domínio próprio): JSON estático costuma ficar em cache na CDN — ler via API */
function shouldUseGithubContentsApiFirst() {
  return isGitHubPagesHost() || !isLikelyLocalDevServer();
}

/** ETag da API Contents — permite 304 (sem gastar rate limit) no polling */
let githubContentsEtag = null;

let lastSyncTime = 0;
let lastSyncSha = null;

function decodeGithubContentsJson(apiData) {
  const rawContent = apiData.content.replace(/\n/g, '');
  const binaryString = atob(rawContent);
  const bytes = new Uint8Array(binaryString.length);
  for (let i = 0; i < binaryString.length; i++) {
    bytes[i] = binaryString.charCodeAt(i);
  }
  const content = new TextDecoder('utf-8').decode(bytes);
  return JSON.parse(content);
}

/** Sempre dados frescos: no GitHub Pages o JSON na mesma origem fica em cache na CDN — priorizar API. */
async function fetchLatestDadosSync() {
  const token = localStorage.getItem('githubToken');
  const apiHeaders = { Accept: 'application/vnd.github.v3+json' };
  if (token) apiHeaders.Authorization = `token ${token}`;

  if (shouldUseGithubContentsApiFirst()) {
    try {
      const r = await fetch(
        `https://api.github.com/repos/${GITHUB_REPO}/contents/${GITHUB_FILE}?ref=${GITHUB_BRANCH}`,
        { headers: apiHeaders, cache: 'no-store' }
      );
      if (r.ok) {
        const etag = r.headers.get('ETag');
        if (etag) githubContentsEtag = etag;
        const apiData = await r.json();
        const bundle = decodeGithubContentsJson(apiData);
        console.log('[data] Fonte: API GitHub (deploy público — sem cache CDN do JSON estático)', bundle.lastUpdate || '');
        return { bundle, sha: apiData.sha, source: 'api' };
      }
    } catch (e) {
      console.log('[data] API GitHub (Pages):', e.message);
    }
  }

  try {
    const r = await fetch('dados-sync.json', { cache: 'no-store' });
    if (r.ok) {
      const j = await r.json();
      if (j && j.data) {
        console.log('[data] Fonte: dados-sync.json (servidor local ou deploy)', j.lastUpdate || '');
        return { bundle: j, sha: null, source: 'static' };
      }
    }
  } catch (e) {}

  try {
    const r = await fetch(
      `https://api.github.com/repos/${GITHUB_REPO}/contents/${GITHUB_FILE}?ref=${GITHUB_BRANCH}`,
      { headers: apiHeaders, cache: 'no-store' }
    );
    if (r.ok) {
      const etag = r.headers.get('ETag');
      if (etag) githubContentsEtag = etag;
      const apiData = await r.json();
      const bundle = decodeGithubContentsJson(apiData);
      console.log('[data] Fonte: API GitHub (evita cache do raw)', bundle.lastUpdate || '');
      return { bundle, sha: apiData.sha, source: 'api' };
    }
  } catch (e) {
    console.log('[data] API GitHub:', e.message);
  }

  try {
    const r = await fetch(
      `https://raw.githubusercontent.com/${GITHUB_REPO}/${GITHUB_BRANCH}/${GITHUB_FILE}`,
      { cache: 'no-store' }
    );
    if (r.ok) {
      const bundle = await r.json();
      console.warn('[data] Fonte: raw.githubusercontent (pode estar defasado por CDN)');
      return { bundle, sha: null, source: 'raw' };
    }
  } catch (e) {}

  return null;
}
let isSyncing = false;

function setupAutoSync() {
  if (!localStorage.getItem('githubToken')) {
    const token = prompt(
      'Token do GitHub — necessário neste aparelho para ENVIAR alterações ao repositório.\n\n' +
      '(Quem só consulta pode cancelar; quem edita precisa do token com permissão no repo.)\n\n' +
      'Criar em: https://github.com/settings/tokens'
    );
    if (token && token.trim()) {
      localStorage.setItem('githubToken', token.trim());
    }
  }
  syncWithGitHub();
  setInterval(syncWithGitHub, SYNC_INTERVAL);
}

// Renderizar a aba que está ativa
function renderCurrentTab() {
  const currentTab = document.querySelector('.tab-btn.active');
  if (currentTab) {
    const tab = currentTab.dataset.tab;
    if (tab === 'dashboard') renderDashboard();
    else if (tab === 'agenda') renderAgenda();
    else if (tab === 'clientes') renderClientes();
    else if (tab === 'produtos') renderProdutos();
    else if (tab === 'estoque') renderEstoqueVivo();
  } else {
    renderDashboard();
  }
}

async function syncWithGitHub() {
  if (isSyncing || isSaving) return;
  isSyncing = true;

  function applyRemoteFromGitHub(remoteData, shaOrNull) {
    if (!remoteData || !remoteData.data || !remoteData.lastUpdate) return;
    if (remoteData.lastUpdate === appState.lastUpdate) {
      if (shaOrNull) lastSyncSha = shaOrNull;
      return;
    }
    const remoteTime = new Date(remoteData.lastUpdate).getTime();
    if (!Number.isFinite(remoteTime)) return;
    console.log('[sync] Aplicando dados remotos —', remoteData.lastUpdate);
    appState.data = normalizeDataShape(remoteData.data);
    appState.lastUpdate = remoteData.lastUpdate;
    lastSyncTime = remoteTime;
    if (shaOrNull) lastSyncSha = shaOrNull;
    else lastSyncSha = null;

    localStorage.setItem(DATA_STORAGE_KEY, JSON.stringify(appState.data));
    localStorage.setItem(CLIENT_DATA_TS_KEY, String(remoteTime));
    if (appState.data.prioridades && Object.keys(appState.data.prioridades).length) {
      localStorage.setItem('fazendas-up-prioridades', JSON.stringify(appState.data.prioridades));
    }

    renderCurrentTab();
    showSyncNotification('Dados sincronizados.', 'success');
    console.log('[sync] Dados sincronizados e aba atualizada.');
  }

  async function fallbackFromStatic(reason) {
    if (typeof location === 'undefined' || location.protocol === 'file:') return;
    try {
      const r = await fetch(`dados-sync.json?poll=${Date.now()}`, { cache: 'no-store' });
      if (!r.ok) return;
      const remoteData = await r.json();
      if (remoteData && remoteData.data && remoteData.lastUpdate) {
        applyRemoteFromGitHub(remoteData, null);
        console.log(`[sync] Fallback dados-sync.json aplicado (${reason})`);
      }
    } catch (e) {
      console.log('[sync] Fallback dados-sync.json falhou:', e.message);
    }
  }

  try {
    if (isLikelyLocalDevServer() && typeof location !== 'undefined' && location.protocol !== 'file:') {
      try {
        const r = await fetch(`dados-sync.json?poll=${Date.now()}`, { cache: 'no-store' });
        if (r.ok) {
          const remoteData = await r.json();
          if (remoteData && remoteData.data && remoteData.lastUpdate) {
            applyRemoteFromGitHub(remoteData, null);
          }
        }
      } catch (e) {
        console.log('[sync] dados-sync.json (servidor local):', e.message);
      }
      return;
    }

    const token = localStorage.getItem('githubToken');
    const headers = { Accept: 'application/vnd.github.v3+json' };
    if (token) headers.Authorization = `token ${token}`;
    if (githubContentsEtag) headers['If-None-Match'] = githubContentsEtag;

    const apiUrl = `https://api.github.com/repos/${GITHUB_REPO}/contents/${GITHUB_FILE}?ref=${GITHUB_BRANCH}`;
    const response = await fetch(apiUrl, { headers, cache: 'no-store' });

    if (response.status === 304) {
      return;
    }

    if (response.ok) {
      const etag = response.headers.get('ETag');
      if (etag) githubContentsEtag = etag;
      const apiData = await response.json();
      if (apiData.sha === lastSyncSha) {
        return;
      }
      const remoteData = decodeGithubContentsJson(apiData);
      applyRemoteFromGitHub(remoteData, apiData.sha);
      return;
    }

    if (response.status === 403) {
      console.log('[sync] Rate limit do GitHub atingido. Aguardando...');
      await fallbackFromStatic('api-403');
    } else {
      console.log('[sync] API GitHub:', response.status, response.statusText);
      await fallbackFromStatic(`api-${response.status}`);
    }
  } catch (e) {
    console.log('Erro ao sincronizar:', e.message);
    await fallbackFromStatic('exception');
  } finally {
    isSyncing = false;
  }
}

function showSyncNotification(message, variant = 'success', durationMs = 2800) {
  const notif = document.createElement('div');
  const bg =
    variant === 'error'
      ? '#b91c1c'
      : variant === 'info'
        ? '#1e40af'
        : variant === 'warning'
          ? '#c2410c'
          : '#059669';
  notif.style.cssText = `
    position: fixed;
    top: 20px;
    right: 20px;
    max-width: min(420px, calc(100vw - 32px));
    background: ${bg};
    color: white;
    padding: 12px 18px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    z-index: 10000;
    box-shadow: 0 8px 24px rgba(0,0,0,0.18);
  `;
  notif.textContent = message;
  document.body.appendChild(notif);
  let done = false;
  let timer = null;
  function dismiss() {
    if (done) return;
    done = true;
    if (timer) clearTimeout(timer);
    notif.style.opacity = '0';
    notif.style.transition = 'opacity 0.25s ease';
    setTimeout(() => notif.remove(), 250);
  }
  timer = setTimeout(dismiss, durationMs);
  return { dismiss, el: notif };
}

// Forcar sincronizacao imediata com GitHub (para administrador)
function forcarSincronizacaoGitHub() {
  if (userRole !== 'administrativo') {
    alert('Apenas administradores podem sincronizar com GitHub');
    return;
  }
  
  const btn = document.getElementById('btnSincronizar');
  const textoOriginal = btn.textContent;
  btn.disabled = true;
  btn.textContent = 'Sincronizando…';
  
  console.log('[sync] Iniciando sincronização forçada');
  // Não apagar localStorage: mantém cópia local se a API falhar; só força nova leitura no GitHub.
  lastSyncTime = 0;
  lastSyncSha = null;
  githubContentsEtag = null;
  isSyncing = false;
  console.log('[sync] Cursor de sync resetado (dados locais preservados)');
  
  // Aguardar e sincronizar
  setTimeout(() => {
    syncWithGitHub().then(() => {
      console.log('[sync] Sincronização concluída');
      showSyncNotification('Dados sincronizados.', 'success');
      renderCurrentTab();
      btn.disabled = false;
      btn.textContent = textoOriginal;
    }).catch(e => {
      console.error('[sync] Erro:', e);
      showSyncNotification('Erro: ' + e.message, 'error');
      btn.disabled = false;
      btn.textContent = textoOriginal;
    });
  }, 500);
}

/** Base64 de UTF-8 sem estourar a pilha (apply não aceita milhões de argumentos). */
function utf8JsonToBase64(content) {
  const encoder = new TextEncoder();
  const bytes = encoder.encode(content);
  const chunk = 0x8000;
  let binary = '';
  for (let i = 0; i < bytes.length; i += chunk) {
    binary += String.fromCharCode.apply(null, bytes.subarray(i, Math.min(i + chunk, bytes.length)));
  }
  return btoa(binary);
}

// Salvar dados no GitHub quando houver mudancas
async function saveToGitHub(retryCount = 0) {
  let loadingToast = null;
  try {
    let token = localStorage.getItem('githubToken');
    if (!token || !String(token).trim()) {
      showSyncNotification(
        'Sem token do GitHub — nada foi enviado ao repositório. Cole o token na próxima janela ou recarregue a página.',
        'warning',
        5500
      );
      const t = prompt(
        'Para enviar pedidos/clientes/produtos ao GitHub, cole um Personal Access Token com acesso ao repositório fazendasup/fazendas-up:\n\n(Cancelar = continuar só neste aparelho)'
      );
      if (t && String(t).trim()) {
        localStorage.setItem('githubToken', String(t).trim());
        token = localStorage.getItem('githubToken');
      }
    }
    if (!token || !String(token).trim()) {
      return;
    }

    loadingToast = showSyncNotification('Sincronizando com o GitHub…', 'info', 120000);

    const now = new Date().toISOString();
    const dataToSave = {
      data: appState.data,
      lastUpdate: now
    };

    const content = JSON.stringify(dataToSave, null, 2);
    const base64Content = utf8JsonToBase64(content);

    console.log('[sync] Salvando no GitHub...');

    let sha = null;
    try {
      const getResponse = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${GITHUB_FILE}`, {
        headers: {
          Authorization: `token ${token}`,
          Accept: 'application/vnd.github.v3+json',
        },
      });
      if (getResponse.ok) {
        sha = (await getResponse.json()).sha;
      }
    } catch (e) {}

    const putBody = {
      message: `Sincronizar dados - ${new Date().toLocaleString('pt-BR')}`,
      content: base64Content,
      branch: GITHUB_BRANCH,
    };

    if (sha) putBody.sha = sha;

    const putResponse = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${GITHUB_FILE}`, {
      method: 'PUT',
      headers: {
        Authorization: `token ${token}`,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify(putBody),
    });

    loadingToast.dismiss();
    loadingToast = null;

    if (putResponse.ok) {
      appState.lastUpdate = now;
      localStorage.setItem(CLIENT_DATA_TS_KEY, String(new Date(now).getTime()));
      githubContentsEtag = null;
      console.log('[sync] Salvo no GitHub.');
      showSyncNotification('Salvo no GitHub.', 'success');
    } else if (putResponse.status === 409) {
      if (retryCount >= 8) {
        showSyncNotification('Conflito ao salvar no GitHub após várias tentativas. Sincronize e tente de novo.', 'error', 7000);
        return;
      }
      console.log('[sync] Conflito de SHA, tentando novamente...');
      await new Promise((r) => setTimeout(r, 500));
      await saveToGitHub(retryCount + 1);
    } else {
      let detail = putResponse.statusText;
      try {
        const errBody = await putResponse.json();
        if (errBody && errBody.message) detail = errBody.message;
      } catch (x) {}
      console.error('Erro ao salvar:', detail);
      showSyncNotification('Falha ao salvar no GitHub: ' + detail, 'error', 7000);
    }
  } catch (e) {
    if (loadingToast) loadingToast.dismiss();
    console.error('Erro ao salvar no GitHub:', e.message);
    showSyncNotification('Erro ao salvar no GitHub: ' + e.message, 'error', 6000);
  }
}
